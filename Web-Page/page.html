<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Query Frontend</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #374151;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827 50%, #1e293b);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      padding: 24px;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 14px;
      font-size: 15px;
      line-height: 1.5;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }

    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .status.error { color: #fecaca; border-color: rgba(239, 68, 68, 0.45); }
    .status.success { color: #bbf7d0; border-color: rgba(34, 197, 94, 0.45); }

    .table-wrap {
      margin-top: 24px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      background: rgba(255,255,255,0.04);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 800px) {
      .row {
        grid-template-columns: 1fr;
      }

      .controls {
        flex-direction: row;
        flex-wrap: wrap;
      }

      button {
        flex: 1 1 180px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Database Query Frontend</h1>
      <p>Write a SQL query, send it, and view the returned rows in a table.</p>

      <div class="row">
        <textarea id="sqlInput" placeholder="Write your SQL query here..."></textarea>

        <div class="controls">
          <button id="sendBtn">Send query</button>
          <button id="clearBtn" class="secondary" type="button">Clear results</button>
        </div>
      </div>

      <div id="status" class="status">Ready.</div>

      <div class="table-wrap" id="tableWrap">
        <div class="empty">No results yet.</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8000/query';

    const sqlInput = document.getElementById('sqlInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusBox = document.getElementById('status');
    const tableWrap = document.getElementById('tableWrap');

    function setStatus(message, type = '') {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    function clearResults() {
      tableWrap.innerHTML = '<div class="empty">No results yet.</div>';
      setStatus('Results cleared.');
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeResponse(data) {
      if (Array.isArray(data)) {
        return {
          columns: data[0] ? data[0].map((_, index) => `Column ${index + 1}`) : [],
          rows: data
        };
      }

      if (data && Array.isArray(data.results)) {
        return {
          columns: data.results[0] ? data.results[0].map((_, index) => `Column ${index + 1}`) : [],
          rows: data.results
        };
      }

      if (data && Array.isArray(data.rows)) {
        return {
          columns: Array.isArray(data.columns) ? data.columns : (data.rows[0] ? data.rows[0].map((_, index) => `Column ${index + 1}`) : []),
          rows: data.rows
        };
      }

      return { columns: [], rows: [] };
    }

    function renderTable(columns, rows) {
      const safeColumns = Array.isArray(columns) ? columns : [];
      const safeRows = Array.isArray(rows) ? rows : [];

      if (safeColumns.length === 0 && safeRows.length === 0) {
        tableWrap.innerHTML = '<div class="empty">Query executed, but no rows were returned.</div>';
        return;
      }

      let html = '<table><thead><tr>';

      if (safeColumns.length > 0) {
        safeColumns.forEach(column => {
          html += `<th>${escapeHtml(column)}</th>`;
        });
      } else if (safeRows[0]) {
        safeRows[0].forEach((_, index) => {
          html += `<th>Column ${index + 1}</th>`;
        });
      }

      html += '</tr></thead><tbody>';

      safeRows.forEach(row => {
        const rowValues = Array.isArray(row) ? row : [row];
        html += '<tr>';
        rowValues.forEach(value => {
          html += `<td>${escapeHtml(value ?? '')}</td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table>';
      tableWrap.innerHTML = html;
    }

    async function sendQuery() {
      const sql = sqlInput.value.trim();

      if (!sql) {
        setStatus('Please write a SQL query first.', 'error');
        return;
      }

      sendBtn.disabled = true;
      setStatus('Sending query...');

      try {
        const response = await fetch(`${API_URL}?sql=${encodeURIComponent(sql)}`, {
          method: 'GET'
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText || 'Request failed'}`);
        }

        const data = await response.json();
        const normalized = normalizeResponse(data);
        renderTable(normalized.columns, normalized.rows);
        setStatus(`Query completed. Returned ${normalized.rows.length} row(s).`, 'success');
      } catch (error) {
        console.error(error);
        setStatus(`Failed to run query: ${error.message}`, 'error');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendQuery);
    clearBtn.addEventListener('click', clearResults);

    sqlInput.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        sendQuery();
      }
    });
  </script>
</body>
</html>
