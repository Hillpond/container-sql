<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Upload</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #374151;
      --success: #22c55e;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827 50%, #1e293b);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 760px; margin: 0 auto; }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      padding: 24px;
      backdrop-filter: blur(6px);
      margin-bottom: 24px;
    }

    h1 { margin: 0 0 8px; font-size: 2rem; }
    h2 { margin: 0 0 16px; font-size: 1.3rem; }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    .upload-box {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 24px;
      background: rgba(255,255,255,0.02);
      text-align: center;
      margin-bottom: 16px;
    }

    .upload-box.dragover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.08);
    }

    input[type="file"] {
      display: block;
      margin: 14px auto 0;
      color: var(--text);
    }

    .selected-file { margin: 14px 0 0; color: var(--text); font-weight: 600; }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }

    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.secondary:hover { background: rgba(255,255,255,0.05); }

    button.active-btn {
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid var(--accent);
      color: #93c5fd;
    }
    button.active-btn:hover { background: rgba(59, 130, 246, 0.3); }

    button.danger {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }
    button.danger:hover { background: rgba(239, 68, 68, 0.25); }

    button.build-btn {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: #86efac;
    }
    button.build-btn:hover { background: rgba(34, 197, 94, 0.25); }

    button:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      min-height: 48px;
      display: flex;
      align-items: center;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status.error   { color: #fecaca; border-color: rgba(239, 68, 68, 0.45); }
    .status.success { color: #bbf7d0; border-color: rgba(34, 197, 94, 0.45); }

    .endpoint { margin-top: 20px; color: var(--muted); font-size: 14px; }

    code {
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .file-row {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.02);
      transition: background 0.15s, border-color 0.15s;
    }

    .file-row:hover { background: rgba(255,255,255,0.04); }

    .file-row.active {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.08);
    }

    .file-name {
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .file-ext {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(59,130,246,0.15);
      color: #93c5fd;
      font-weight: 600;
      text-transform: uppercase;
    }

    .star { color: #facc15; font-size: 16px; }
    .file-count { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .empty-state { color: var(--muted); text-align: center; padding: 24px 0; }

    .selected-banner {
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #93c5fd;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
      justify-content: space-between;
      align-items: center;
    }

    .selected-banner.visible { display: flex; }

    .build-status {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .build-status.visible { display: block; }
    .build-status.success { color: #bbf7d0; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.3); }
    .build-status.error   { color: #fecaca; background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <div class="container">

    <!-- Upload card -->
    <div class="card">
      <h1>Admin Upload Page</h1>
      <p>Select a file and upload it to the admin endpoint.</p>

      <div class="upload-box" id="uploadBox">
        <div>Drag and drop a file here, or choose one below.</div>
        <input id="fileInput" type="file" />
        <div id="selectedFile" class="selected-file">No file selected.</div>
      </div>

      <div class="controls">
        <button id="uploadBtn">Upload file</button>
        <button id="clearBtn" class="secondary" type="button">Clear</button>
      </div>

      <div id="status" class="status">Ready.</div>

      <div class="endpoint">
        Upload target: <code>http://localhost:8000/admin/upload</code>
      </div>
    </div>

    <!-- Files card -->
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
        <h2 style="margin: 0;">Uploaded Files</h2>
        <button class="secondary" onclick="loadFiles()" type="button" style="padding: 8px 14px; font-size: 13px;">
          ↻ Refresh
        </button>
      </div>

      <!-- Active selection banner + build button -->
      <div id="selectedBanner" class="selected-banner">
        <span>★ Active: <strong id="bannerFilename">—</strong></span>
      </div>

      <div id="buildStatus" class="build-status"></div>

      <div id="fileCount" class="file-count"></div>
      <div id="fileList"><p class="empty-state">Loading...</p></div>
    </div>

  </div>

  <script>
    const BASE_URL     = 'http://127.0.0.1:8000';
    const UPLOAD_URL   = `${BASE_URL}/admin/upload`;
    const FILES_URL    = `${BASE_URL}/admin/files`;
    const SELECTED_URL = `${BASE_URL}/admin/selected`;

    const fileInput    = document.getElementById('fileInput');
    const uploadBtn    = document.getElementById('uploadBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const statusBox    = document.getElementById('status');
    const selectedFile = document.getElementById('selectedFile');
    const uploadBox    = document.getElementById('uploadBox');

    function setStatus(message, type = '') {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    function updateSelectedFile() {
      const file = fileInput.files[0];
      selectedFile.textContent = file
        ? `Selected: ${file.name} (${Math.round(file.size / 1024)} KB)`
        : 'No file selected.';
    }

    function clearSelection() {
      fileInput.value = '';
      updateSelectedFile();
      setStatus('Cleared.');
    }

    function getExtension(filename) {
      return filename.split('.').pop() || '?';
    }

    async function uploadFile() {
      const file = fileInput.files[0];
      if (!file) { setStatus('Please choose a file first.', 'error'); return; }

      const formData = new FormData();
      formData.append('file', file);
      uploadBtn.disabled = true;
      setStatus(`Uploading ${file.name}...`);

      try {
        const response = await fetch(UPLOAD_URL, { method: 'POST', body: formData });
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText || 'Upload failed'}`);
        }
        const data = await response.json();
        setStatus(data?.message || `${file.name} uploaded successfully.`, 'success');
        loadFiles();
      } catch (error) {
        setStatus(`Failed to upload file: ${error.message}`, 'error');
      } finally {
        uploadBtn.disabled = false;
      }
    }

    async function selectFile(filename) {
      await fetch(`${BASE_URL}/admin/select/${encodeURIComponent(filename)}`, { method: 'POST' });
      loadFiles();
    }

    async function deleteFile(filename) {
      if (!confirm(`Slett ${filename}?`)) return;
      try {
        const res = await fetch(`${BASE_URL}/admin/delete/${encodeURIComponent(filename)}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.ok) {
          loadFiles();
        } else {
          alert('Kunne ikke slette: ' + data.message);
        }
      } catch (err) {
        alert('Feil ved sletting');
      }
    }

    async function buildDatabase() {
      const buildBtn    = document.getElementById('buildBtn');
      const buildStatus = document.getElementById('buildStatus');

      buildBtn.disabled = true;
      buildBtn.textContent = 'Bygger...';
      buildStatus.className = 'build-status';
      buildStatus.textContent = '';

      try {
        const res  = await fetch(`${BASE_URL}/admin/build`, { method: 'POST' });
        const data = await res.json();

        buildStatus.textContent = data.message || 'Ferdig!';
        buildStatus.className = `build-status visible ${data.ok ? 'success' : 'error'}`;
      } catch (err) {
        buildStatus.textContent = 'Feil: kunne ikke bygge databasen';
        buildStatus.className = 'build-status visible error';
      } finally {
        buildBtn.disabled = false;
        buildBtn.textContent = '⚡ Bygg database';
      }
    }

    async function loadFiles() {
      const fileList   = document.getElementById('fileList');
      const fileCount  = document.getElementById('fileCount');
      const banner     = document.getElementById('selectedBanner');
      const bannerName = document.getElementById('bannerFilename');

      fileList.innerHTML = '<p class="empty-state">Loading...</p>';
      fileCount.textContent = '';

      try {
        const [filesRes, selRes] = await Promise.all([
          fetch(FILES_URL),
          fetch(SELECTED_URL)
        ]);

        const filesData = await filesRes.json();
        const selData   = await selRes.json();
        const selected  = selData.selected;

        if (selected) {
          bannerName.textContent = selected;
          banner.classList.add('visible');
        } else {
          banner.classList.remove('visible');
        }

        if (filesData.files.length === 0) {
          fileCount.textContent = '0 files';
          fileList.innerHTML = '<p class="empty-state">No files uploaded yet.</p>';
          return;
        }

        fileCount.textContent = `${filesData.files.length} file${filesData.files.length !== 1 ? 's' : ''}`;

        fileList.innerHTML = filesData.files.map(file => `
          <div class="file-row ${file.name === selected ? 'active' : ''}">
            <span class="file-name">
              ${file.name === selected ? '<span class="star">★</span>' : ''}
              ${file.name}
            </span>
            <div style="display: flex; align-items: center; gap: 8px;">
              <span class="file-ext">${getExtension(file.name)}</span>
              <button
                onclick="selectFile('${file.name}')"
                class="${file.name === selected ? 'active-btn' : 'secondary'}"
                style="padding: 6px 14px; font-size: 13px; border-radius: 8px;">
                ${file.name === selected ? '✓ Valgt' : 'Velg'}
              </button>
              <button
                onclick="deleteFile('${file.name}')"
                class="danger"
                style="padding: 6px 14px; font-size: 13px; border-radius: 8px;">
                Slett
              </button>
            </div>
          </div>
        `).join('');

      } catch (err) {
        fileList.innerHTML = '<p style="color: var(--error); text-align:center; padding: 16px 0;">Could not load files — is the server running?</p>';
      }
    }

    fileInput.addEventListener('change', updateSelectedFile);
    uploadBtn.addEventListener('click', uploadFile);
    clearBtn.addEventListener('click', clearSelection);

    uploadBox.addEventListener('dragover', (e) => { e.preventDefault(); uploadBox.classList.add('dragover'); });
    uploadBox.addEventListener('dragleave', () => { uploadBox.classList.remove('dragover'); });
    uploadBox.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadBox.classList.remove('dragover');
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        updateSelectedFile();
      }
    });

    loadFiles();
  </script>
</body>
</html>
