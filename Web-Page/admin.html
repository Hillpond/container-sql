<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Upload</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #374151;
      --success: #22c55e;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827 50%, #1e293b);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      padding: 24px;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    .upload-box {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 24px;
      background: rgba(255,255,255,0.02);
      text-align: center;
      margin-bottom: 16px;
    }

    .upload-box.dragover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.08);
    }

    input[type="file"] {
      display: block;
      margin: 14px auto 0;
      color: var(--text);
    }

    .selected-file {
      margin: 14px 0 0;
      color: var(--text);
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      min-height: 48px;
      display: flex;
      align-items: center;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status.error { color: #fecaca; border-color: rgba(239, 68, 68, 0.45); }
    .status.success { color: #bbf7d0; border-color: rgba(34, 197, 94, 0.45); }

    .endpoint {
      margin-top: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    code {
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Admin Upload Page</h1>
      <p>Select a file and upload it to the admin endpoint.</p>

      <div class="upload-box" id="uploadBox">
        <div>Drag and drop a file here, or choose one below.</div>
        <input id="fileInput" type="file" />
        <div id="selectedFile" class="selected-file">No file selected.</div>
      </div>

      <div class="controls">
        <button id="uploadBtn">Upload file</button>
        <button id="clearBtn" class="secondary" type="button">Clear</button>
      </div>

      <div id="status" class="status">Ready.</div>

      <div class="endpoint">
        Upload target: <code>http://localhost:8000/admin/upload</code>
      </div>
    </div>
  </div>

  <script>
    const UPLOAD_URL = 'http://localhost:8000/admin/upload';

    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusBox = document.getElementById('status');
    const selectedFile = document.getElementById('selectedFile');
    const uploadBox = document.getElementById('uploadBox');

    function setStatus(message, type = '') {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    function updateSelectedFile() {
      const file = fileInput.files[0];
      selectedFile.textContent = file
        ? `Selected: ${file.name} (${Math.round(file.size / 1024)} KB)`
        : 'No file selected.';
    }

    function clearSelection() {
      fileInput.value = '';
      updateSelectedFile();
      setStatus('Cleared.');
    }

    async function uploadFile() {
      const file = fileInput.files[0];

      if (!file) {
        setStatus('Please choose a file first.', 'error');
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      uploadBtn.disabled = true;
      setStatus(`Uploading ${file.name}...`);

      try {
        const response = await fetch(UPLOAD_URL, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText || 'Upload failed'}`);
        }

        const data = await response.json();
        const message = data?.message || `${file.name} uploaded successfully.`;
        setStatus(message, 'success');
      } catch (error) {
        console.error(error);
        setStatus(`Failed to upload file: ${error.message}`, 'error');
      } finally {
        uploadBtn.disabled = false;
      }
    }

    fileInput.addEventListener('change', updateSelectedFile);
    uploadBtn.addEventListener('click', uploadFile);
    clearBtn.addEventListener('click', clearSelection);

    uploadBox.addEventListener('dragover', (event) => {
      event.preventDefault();
      uploadBox.classList.add('dragover');
    });

    uploadBox.addEventListener('dragleave', () => {
      uploadBox.classList.remove('dragover');
    });

    uploadBox.addEventListener('drop', (event) => {
      event.preventDefault();
      uploadBox.classList.remove('dragover');

      if (event.dataTransfer.files && event.dataTransfer.files.length > 0) {
        fileInput.files = event.dataTransfer.files;
        updateSelectedFile();
      }
    });
  </script>
</body>
</html>
